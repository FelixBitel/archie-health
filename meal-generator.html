<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍽️ Генератор меню — Арчи</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #12121a 50%, #0f172a 100%); min-height: 100vh; }
    .glass { background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .glass-card { background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); transition: all 0.3s; }
    .gradient-text { background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 10px; transition: all 0.2s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }
    .bar-fill { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; border-radius: 12px; color: white; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease, slideOut 0.3s ease 2.7s forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } }
    @keyframes slideOut { to { transform: translateX(100%); opacity: 0; } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .weight-btn:active { transform: scale(0.85); }
    /* Reaction buttons */
    .reaction-btn.active { ring: 2px; opacity: 1; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="text-white overflow-x-hidden">
  <div id="toast-container" class="fixed bottom-6 right-6 z-50"></div>

  <!-- BG blobs -->
  <div class="fixed inset-0 pointer-events-none">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-orange-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-green-500/10 rounded-full blur-3xl"></div>
  </div>

  <!-- Nav -->
  <nav class="glass sticky top-0 z-40 px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <a href="index.html" class="text-gray-400 hover:text-white transition text-sm">
          <i class="fas fa-arrow-left mr-2"></i>Назад
        </a>
        <div class="w-px h-5 bg-white/20"></div>
        <span class="text-lg font-bold gradient-text">🍽️ Генератор меню</span>
      </div>
      <div class="text-sm text-gray-500" id="today-date"></div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">

    <!-- ═══ ПРОФИЛЬ ПИТОМЦА ═══ -->
    <section class="glass-card rounded-3xl p-6">
      <h2 class="text-xl font-bold mb-5 flex items-center gap-2">
        <i class="fas fa-paw text-orange-400"></i>Профиль питомца
      </h2>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Имя</label>
          <input id="dog-name" type="text" value="Арчи" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10">
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Порода</label>
          <input id="dog-breed" type="text" value="Мишлинг" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10">
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Возраст (лет)</label>
          <input id="dog-age" type="number" value="11" min="0" max="25" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10">
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Вес (кг)</label>
          <input id="dog-weight" type="number" step="0.1" value="21" min="1" max="100" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10">
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Активность</label>
          <select id="dog-activity" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10 bg-transparent">
            <option value="low">Низкая</option>
            <option value="medium" selected>Средняя</option>
            <option value="high">Высокая</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Цель</label>
          <select id="dog-goal" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10 bg-transparent">
            <option value="maintenance" selected>Поддержание</option>
            <option value="loss">Снижение веса</option>
            <option value="gain">Набор веса</option>
            <option value="recovery">Восстановление</option>
          </select>
        </div>
      </div>

      <!-- Аллергии и лекарства -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Аллергии / непереносимость (через запятую)</label>
          <input id="dog-allergies" type="text" placeholder="курица, рыба..." class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10">
        </div>
        <div>
          <label class="text-xs text-gray-500 mb-1 block">Лекарства / добавки (через запятую)</label>
          <input id="dog-medications" type="text" value="Урзахол, Гепатосан" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10">
        </div>
        <div class="md:col-span-2">
          <label class="text-xs text-gray-500 mb-1 block">Особенности здоровья</label>
          <input id="dog-health" type="text" placeholder="жкт, суставы, почки..." value="жкт" class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-orange-500 border border-white/10">
        </div>
      </div>
    </section>

    <!-- ═══ КНОПКА ГЕНЕРАЦИИ + НОРМА ═══ -->
    <div class="flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
      <button onclick="generateMenu()" class="flex-1 py-4 bg-gradient-to-r from-orange-500 to-amber-500 rounded-2xl font-bold text-lg hover:from-orange-600 hover:to-amber-600 transition flex items-center justify-center gap-3">
        <i class="fas fa-wand-magic-sparkles"></i>Создать меню на сегодня
      </button>
      <div class="glass-card rounded-2xl px-6 py-4 text-center min-w-[160px]">
        <div class="text-xs text-gray-500 mb-1">Дневная норма</div>
        <div id="daily-norm-display" class="text-2xl font-bold text-orange-400">— ккал</div>
      </div>
    </div>

    <!-- ═══ ПРЕДУПРЕЖДЕНИЯ ═══ -->
    <div id="warnings-section" class="hidden space-y-3"></div>

    <!-- ═══ МЕНЮ ═══ -->
    <div id="menu-section" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6 fade-in"></div>

    <!-- ═══ ЖУРНАЛ РЕАКЦИИ ═══ -->
    <div id="reaction-section" class="hidden">
      <div class="glass-card rounded-3xl p-6">
        <h2 class="text-xl font-bold mb-5 flex items-center gap-2">
          <i class="fas fa-clipboard-list text-green-400"></i>Записать реакцию
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div>
            <label class="text-xs text-gray-500 mb-2 block">Стул</label>
            <div class="flex gap-2 flex-wrap">
              <button onclick="setReaction('stool','норма')" class="reaction-btn btn-ghost text-sm" data-field="stool" data-val="норма">✅ Норма</button>
              <button onclick="setReaction('stool','мягкий')" class="reaction-btn btn-ghost text-sm" data-field="stool" data-val="мягкий">😐 Мягкий</button>
              <button onclick="setReaction('stool','жидкий')" class="reaction-btn btn-ghost text-sm" data-field="stool" data-val="жидкий">⚠️ Жидкий</button>
              <button onclick="setReaction('stool','запор')" class="reaction-btn btn-ghost text-sm" data-field="stool" data-val="запор">🔴 Запор</button>
            </div>
          </div>
          <div>
            <label class="text-xs text-gray-500 mb-2 block">Энергия</label>
            <div class="flex gap-2 flex-wrap">
              <button onclick="setReaction('energy','высокая')" class="reaction-btn btn-ghost text-sm" data-field="energy" data-val="высокая">⚡ Высокая</button>
              <button onclick="setReaction('energy','хорошая')" class="reaction-btn btn-ghost text-sm" data-field="energy" data-val="хорошая">👍 Хорошая</button>
              <button onclick="setReaction('energy','низкая')" class="reaction-btn btn-ghost text-sm" data-field="energy" data-val="низкая">😴 Низкая</button>
            </div>
          </div>
          <div>
            <label class="text-xs text-gray-500 mb-2 block">Общая оценка</label>
            <div class="flex gap-2">
              <button onclick="setReaction('rating','отлично')" class="reaction-btn btn-ghost text-sm" data-field="rating" data-val="отлично">⭐⭐⭐</button>
              <button onclick="setReaction('rating','хорошо')" class="reaction-btn btn-ghost text-sm" data-field="rating" data-val="хорошо">⭐⭐</button>
              <button onclick="setReaction('rating','плохо')" class="reaction-btn btn-ghost text-sm" data-field="rating" data-val="плохо">⭐</button>
            </div>
          </div>
        </div>
        <textarea id="reaction-notes" placeholder="Дополнительные заметки..." rows="2" class="w-full mt-4 glass rounded-xl px-4 py-3 text-sm focus:outline-none border border-white/10 resize-none"></textarea>
        <button onclick="saveReaction()" class="mt-4 w-full py-3 bg-gradient-to-r from-green-500 to-emerald-500 rounded-xl font-semibold hover:from-green-600 hover:to-emerald-600 transition">
          <i class="fas fa-save mr-2"></i>Сохранить реакцию
        </button>
      </div>
    </div>

    <!-- ═══ ИСТОРИЯ ПИТАНИЯ ═══ -->
    <section id="history-section" class="glass-card rounded-3xl p-6">
      <div class="flex justify-between items-center mb-5">
        <h2 class="text-xl font-bold flex items-center gap-2">
          <i class="fas fa-history text-blue-400"></i>История питания
        </h2>
        <span class="text-xs text-gray-500">Последние 7 дней</span>
      </div>
      <div id="history-list" class="space-y-3">
        <p class="text-gray-500 text-sm text-center py-6">История пока пуста. Создайте первое меню!</p>
      </div>
    </section>

    <!-- ═══ AI-АНАЛИЗ ═══ -->
    <section class="glass-card rounded-3xl p-6">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
        <i class="fas fa-brain text-purple-400"></i>AI-анализ питания
      </h2>
      <div class="mb-4">
        <label class="text-xs text-gray-500 mb-1 block">Hugging Face API токен (необязательно)</label>
        <input id="hf-token" type="password" placeholder="hf_..." class="w-full glass rounded-xl px-3 py-2 text-sm focus:outline-none border border-white/10">
      </div>
      <button onclick="runAIAnalysis()" class="w-full py-3 bg-gradient-to-r from-purple-500 to-violet-600 rounded-xl font-semibold hover:from-purple-600 hover:to-violet-700 transition flex items-center justify-center gap-2">
        <i class="fas fa-sparkles"></i>Проанализировать питание за 7 дней
      </button>
      <div id="ai-result" class="hidden mt-5 glass p-5 rounded-2xl">
        <div id="ai-text" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap"></div>
      </div>
    </section>

  </main>

  <script src="js/NutritionEngine.js"></script>
  <script src="js/IngredientDB.js"></script>
  <script src="js/MealGenerator.js"></script>
  <script src="js/MealHistory.js"></script>
  <script>
    // ─── Init ───
    document.getElementById('today-date').textContent = new Date().toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
    loadProfile();
    renderHistory();
    updateDailyNorm();

    // Live update норм при изменении профиля
    ['dog-weight','dog-age','dog-activity','dog-goal'].forEach(id => {
      document.getElementById(id).addEventListener('input', updateDailyNorm);
    });

    // ─── Reaction state ───
    const todayReaction = {};

    function setReaction(field, val) {
      todayReaction[field] = val;
      document.querySelectorAll(`.reaction-btn[data-field="${field}"]`).forEach(btn => {
        if (btn.dataset.val === val) {
          btn.classList.add('bg-white/20');
        } else {
          btn.classList.remove('bg-white/20');
        }
      });
    }

    // ─── Build dog profile from form ───
    function getProfile() {
      return {
        name:        document.getElementById('dog-name').value.trim() || 'Арчи',
        breed:       document.getElementById('dog-breed').value.trim(),
        ageYears:    parseFloat(document.getElementById('dog-age').value) || 11,
        weightKg:    parseFloat(document.getElementById('dog-weight').value) || 21,
        activity:    document.getElementById('dog-activity').value,
        goal:        document.getElementById('dog-goal').value,
        allergies:   document.getElementById('dog-allergies').value.split(',').map(s=>s.trim()).filter(Boolean),
        medications: document.getElementById('dog-medications').value.split(',').map(s=>s.trim()).filter(Boolean),
        healthIssues:document.getElementById('dog-health').value.split(',').map(s=>s.trim()).filter(Boolean),
      };
    }

    function updateDailyNorm() {
      const p = getProfile();
      const cals = NutritionEngine.calcDailyCalories(p);
      document.getElementById('daily-norm-display').textContent = cals + ' ккал';
    }

    // ─── Save / load profile ───
    function saveProfile() {
      localStorage.setItem('archie_dog_profile', JSON.stringify(getProfile()));
    }

    function loadProfile() {
      try {
        const p = JSON.parse(localStorage.getItem('archie_dog_profile'));
        if (!p) return;
        if (p.name)         document.getElementById('dog-name').value = p.name;
        if (p.breed)        document.getElementById('dog-breed').value = p.breed;
        if (p.ageYears)     document.getElementById('dog-age').value = p.ageYears;
        if (p.weightKg)     document.getElementById('dog-weight').value = p.weightKg;
        if (p.activity)     document.getElementById('dog-activity').value = p.activity;
        if (p.goal)         document.getElementById('dog-goal').value = p.goal;
        if (p.allergies)    document.getElementById('dog-allergies').value = p.allergies.join(', ');
        if (p.medications)  document.getElementById('dog-medications').value = p.medications.join(', ');
        if (p.healthIssues) document.getElementById('dog-health').value = p.healthIssues.join(', ');
      } catch {}
    }

    // ─── GENERATE MENU ───
    function generateMenu() {
      const profile = getProfile();
      saveProfile();
      const menu = MealGenerator.generateDayMenu(profile);

      // Warnings
      const wSec = document.getElementById('warnings-section');
      if (menu.warnings.length > 0) {
        wSec.innerHTML = menu.warnings.map(w => `
          <div class="flex items-start gap-3 glass p-4 rounded-2xl border border-yellow-500/20">
            <span class="text-xl">${w.icon}</span>
            <p class="text-sm text-yellow-200/80">${w.text}</p>
          </div>`).join('');
        wSec.classList.remove('hidden');
      } else {
        wSec.classList.add('hidden');
      }

      // Render meals
      const mSec = document.getElementById('menu-section');
      mSec.innerHTML = [renderMealCard(menu.breakfast, '🌅 Завтрак'), renderMealCard(menu.dinner, '🌙 Ужин')].join('');
      mSec.classList.remove('hidden');
      mSec.classList.add('fade-in');

      // Save to history
      const today = new Date().toISOString().split('T')[0];
      MealHistory.save({ date: today, breakfast: menu.breakfast, dinner: menu.dinner, totalCals: menu.totalCals });

      // Show reaction + history
      document.getElementById('reaction-section').classList.remove('hidden');
      renderHistory();

      showToast('Меню создано!', 'success');
      mSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ─── RENDER MEAL CARD ───
    function renderMealCard(meal, title) {
      if (!meal || meal.error) {
        return `<div class="glass-card rounded-3xl p-6"><p class="text-gray-400">${meal?.error || 'Ошибка генерации'}</p></div>`;
      }
      const n = meal.nutrition;
      const methodMap = { 'варка':'🍲 Варка', 'пар':'♨️ Пар', 'тушение':'🥘 Тушение', 'запекание':'🔥 Запекание' };

      const ingredientRows = meal.ingredients.map(({ ingredient, weightG }, idx) => {
        const cals = Math.round(ingredient.calsPer100g / 100 * weightG);
        return `
          <div class="flex items-center justify-between py-2 border-b border-white/5 last:border-0">
            <div class="flex items-center gap-2">
              <span>${ingredient.emoji}</span>
              <span class="text-sm">${ingredient.name}</span>
            </div>
            <div class="flex items-center gap-3">
              <button onclick="adjustWeight(${idx}, '${meal.mealType}', -5)" class="w-6 h-6 rounded bg-white/10 hover:bg-white/20 text-xs font-bold weight-btn">▼</button>
              <span id="w-${meal.mealType}-${idx}" class="text-sm font-medium w-12 text-center">${weightG} г</span>
              <button onclick="adjustWeight(${idx}, '${meal.mealType}', 5)" class="w-6 h-6 rounded bg-white/10 hover:bg-white/20 text-xs font-bold weight-btn">▲</button>
              <span class="text-xs text-orange-400 w-14 text-right">${cals} ккал</span>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="glass-card rounded-3xl p-6">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold">${title}</h3>
            <div class="text-right">
              <div class="text-xl font-bold text-orange-400">${n.cals} ккал</div>
              <div class="text-xs text-gray-500">${methodMap[meal.cookingMethod] || meal.cookingMethod}</div>
            </div>
          </div>

          <!-- Ингредиенты -->
          <div class="mb-5">${ingredientRows}</div>

          <!-- Нутриенты -->
          <div class="space-y-2">
            ${nutriBar('Белок',     n.proteinPct, 'from-blue-500 to-cyan-500',   n.protein + 'г')}
            ${nutriBar('Жиры',      n.fatPct,     'from-yellow-500 to-orange-500', n.fat    + 'г')}
            ${nutriBar('Углеводы',  n.carbsPct,   'from-green-500 to-emerald-500', n.carbs  + 'г')}
          </div>

          <div class="mt-4 pt-4 border-t border-white/10 flex justify-between text-xs text-gray-500">
            <span>Всего: ${n.totalWeight} г</span>
            <span>Клетчатка: ${n.fiber} г</span>
          </div>
        </div>`;
    }

    function nutriBar(label, pct, gradient, detail) {
      return `
        <div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-gray-400">${label}</span>
            <span class="text-gray-300">${pct}% &nbsp; ${detail}</span>
          </div>
          <div class="h-2 bg-gray-700/50 rounded-full">
            <div class="h-full bg-gradient-to-r ${gradient} rounded-full bar-fill" style="width:${Math.min(pct,100)}%"></div>
          </div>
        </div>`;
    }

    // ─── Adjust weight ───
    // Store current menu in memory for weight adjustments
    let _currentMenu = null;
    const _origGenerate = typeof MealGenerator !== 'undefined' ? MealGenerator.generateDayMenu.bind(MealGenerator) : null;

    function adjustWeight(ingIdx, mealType, delta) {
      // Find the element and adjust display
      const el = document.getElementById(`w-${mealType}-${ingIdx}`);
      if (!el) return;
      let val = parseInt(el.textContent) + delta;
      if (val < 5) val = 5;
      el.textContent = val + ' г';
    }

    // ─── SAVE REACTION ───
    function saveReaction() {
      todayReaction.notes = document.getElementById('reaction-notes').value.trim();
      const today = new Date().toISOString().split('T')[0];
      MealHistory.saveReaction(today, todayReaction);
      renderHistory();
      showToast('Реакция сохранена ✓', 'success');
    }

    // ─── RENDER HISTORY ───
    function renderHistory() {
      const history = MealHistory.getRecent(7).reverse();
      const el = document.getElementById('history-list');
      if (history.length === 0) {
        el.innerHTML = '<p class="text-gray-500 text-sm text-center py-6">История пока пуста. Создайте первое меню!</p>';
        return;
      }
      el.innerHTML = history.map(entry => {
        const b = entry.breakfast;
        const d = entry.dinner;
        const bIngr = b?.ingredients?.slice(0,2).map(i => i.ingredient?.name).join(', ') || '—';
        const dIngr = d?.ingredients?.slice(0,2).map(i => i.ingredient?.name).join(', ') || '—';
        const r = entry.reaction || {};
        const dateLabel = new Date(entry.date).toLocaleDateString('ru-RU', { day:'numeric', month:'short' });
        return `
          <div class="glass p-4 rounded-2xl">
            <div class="flex justify-between items-start">
              <div class="flex-1">
                <div class="text-xs text-gray-500 mb-1">${dateLabel}</div>
                <div class="text-sm"><span class="text-orange-400">☀</span> ${bIngr}</div>
                <div class="text-sm"><span class="text-blue-400">🌙</span> ${dIngr}</div>
              </div>
              <div class="text-right text-xs text-gray-500 space-y-1 ml-4">
                ${r.stool   ? `<div>💩 ${r.stool}</div>`  : ''}
                ${r.energy  ? `<div>⚡ ${r.energy}</div>` : ''}
                ${r.rating  ? `<div>${r.rating === 'отлично' ? '⭐⭐⭐' : r.rating === 'хорошо' ? '⭐⭐' : '⭐'}</div>` : ''}
                ${entry.totalCals ? `<div class="text-orange-400">${entry.totalCals} ккал</div>` : ''}
              </div>
            </div>
            ${r.notes ? `<div class="mt-2 text-xs text-gray-400 italic">${r.notes}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ─── AI ANALYSIS ───
    async function runAIAnalysis() {
      const token = document.getElementById('hf-token').value.trim();
      const historyText = MealHistory.formatForAI(7);
      const profile = getProfile();

      if (!historyText || historyText.length < 10) {
        showToast('История питания пуста. Создайте несколько меню.', 'info');
        return;
      }

      const resultEl = document.getElementById('ai-result');
      const textEl   = document.getElementById('ai-text');
      resultEl.classList.remove('hidden');
      textEl.textContent = '🔄 Анализирую рацион...';

      if (!token) {
        // Локальный анализ без API
        textEl.textContent = localAnalysis(profile, MealHistory.getRecent(7));
        return;
      }

      const prompt = `<s>[INST] Ты ветеринарный диетолог. Проанализируй рацион собаки кратко и по делу.

Собака: ${profile.name}, ${profile.breed}, ${profile.ageYears} лет, ${profile.weightKg} кг
Активность: ${profile.activity}, Цель: ${profile.goal}
Препараты: ${profile.medications.join(', ') || 'нет'}
Здоровье: ${profile.healthIssues.join(', ') || 'норма'}

Рацион за 7 дней:
${historyText}

Ответь на русском языке в 4 пунктах:
1. Оценка рациона (1-10)
2. Что работает хорошо
3. Что стоит изменить
4. Вопросы для ветеринара [/INST]`;

      try {
        const resp = await fetch(
          'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3',
          { method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 600, temperature: 0.7 } })
          }
        );
        const data = await resp.json();
        if (data[0]?.generated_text) {
          const output = data[0].generated_text.split('[/INST]').pop().trim();
          textEl.textContent = output;
        } else if (data.error) {
          textEl.textContent = '⚠️ ' + data.error + '\n\n' + localAnalysis(profile, MealHistory.getRecent(7));
        }
      } catch (err) {
        textEl.textContent = '⚠️ Нет подключения к API.\n\n' + localAnalysis(profile, MealHistory.getRecent(7));
      }
    }

    // Локальный анализ (без API)
    function localAnalysis(profile, history) {
      const hasData = history.length > 0;
      const lines = [];
      lines.push(`📊 Локальный анализ для ${profile.name}`);
      lines.push('');
      lines.push(`1. Оценка рациона: ${hasData ? '7/10' : 'нет данных'}`);
      lines.push('');
      lines.push('2. Что работает хорошо:');
      if (profile.medications.some(m => m.toLowerCase().includes('урзахол'))) {
        lines.push('   • Учёт нагрузки на печень в рационе');
      }
      if (profile.ageYears >= 10) lines.push('   • Режим питания подходит для пожилой собаки');
      lines.push('   • Регулярные записи питания');
      lines.push('');
      lines.push('3. Что стоит изменить:');
      lines.push('   • Добавьте рыбу 2-3 раза в неделю (Омега-3 для суставов)');
      lines.push('   • Контролируйте долю жира < 15% от калорий');
      lines.push('   • Чередуйте источники белка (курица ↔ индейка ↔ рыба)');
      lines.push('');
      lines.push('4. Вопросы для ветеринара:');
      lines.push('   • Актуально ли продолжать Урзахол?');
      lines.push('   • Нужны ли добавки Омега-3 или глюкозамин?');
      lines.push('   • Оптимален ли текущий вес?');
      return lines.join('\n');
    }

    // ─── TOAST ───
    function showToast(msg, type = 'success') {
      const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
      const t = document.createElement('div');
      t.className = `toast ${colors[type] || 'bg-gray-700'}`;
      t.textContent = msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
